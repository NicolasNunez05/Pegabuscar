name: Pegabuscar — Hourly

on:
  schedule:
    - cron: '0 */4 * * *'   # corre 6 veces al día: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
  workflow_dispatch:



jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome + Selenium
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          pip install selenium webdriver-manager

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Run Pegabuscar
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DUOC_EMAIL: ${{ secrets.DUOC_EMAIL }}
          DUOC_PASSWORD: ${{ secrets.DUOC_PASSWORD }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}   
        run: |
          cd src
          python main.py

      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}